<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="description" content="Page not found">
    <meta name="robots" content="noindex">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 | Rausch Development</title>
    <link rel="icon" type="image/svg+xml" href="static/images/rausch-development-favicon.svg">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
    <link href="static/css/default.css" rel="stylesheet">
</head>
<body class="error404Body">
<main class="error404Shell">
    <div class="error404Glow error404GlowOne"></div>
    <div class="error404Glow error404GlowTwo"></div>
    <section class="error404Card">
        <div class="error404VisualWrap">
            <div class="error404ImagePanel">
                <img src="static/images/Portfolio 404 Image.png" alt="Confused robot surrounded by server equipment" class="error404Image">
            </div>
            <div class="error404ContentPanel">
                <p class="error404Eyebrow">Wrong Turn</p>
                <h1 class="error404Code">404</h1>
                <h2 class="error404Title">This page ghosted the server.</h2>
                <p class="error404Text">
                    The page you requested may have moved, been removed,
                    or never existed. Even good routes lose their way sometimes.
                </p>
                <div class="error404ActionRow">
                    <a href="/" class="error404PrimaryBtn"><i class="bi bi-house-door-fill"></i>Return Home</a>
                    <a href="portfolio" class="error404SecondaryBtn">View Portfolio</a>
                </div>
                <div class="error404MiniLinks">
                    <a href="about">About</a>
                    <span>•</span>
                    <a href="contact">Contact</a>
                </div>
            </div>
        </div>
    </section>
</main>

</html>
